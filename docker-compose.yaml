services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: whatsapp_call_service
      POSTGRES_USER: lumina
      POSTGRES_PASSWORD: lumina
    ports:
      - "5432:5432"
    volumes:
      - whatsapp_call_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumina -d whatsapp_call_service"]
      interval: 5s
      timeout: 5s
      retries: 10

  whatsapp-call-api:
    build:
      context: ./backend/whatsapp_call_service
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://lumina:lumina@postgres:5432/whatsapp_call_service
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8001}
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy

  whatsapp-call-worker:
    build:
      context: ./backend/whatsapp_call_service
    command: ["python", "-m", "app.worker"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://lumina:lumina@postgres:5432/whatsapp_call_service
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8001}
    depends_on:
      postgres:
        condition: service_healthy
      whatsapp-call-api:
        condition: service_started

volumes:
  whatsapp_call_postgres:
